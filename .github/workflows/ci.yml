name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest
          - windows-11-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace
        run: cargo build --workspace --all-targets --locked --exclude hoshi-client-gtk

      - name: Run tests
        run: cargo test --workspace --all-targets --locked --exclude hoshi-client-gtk

  flatpak:
    name: Flatpak
    needs: build-and-test
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout flatpak-builder-tools
        uses: actions/checkout@v5
        with:
          repository: flatpak/flatpak-builder-tools
          path: flatpak-builder-tools

      - name: Generate cargo-sources.json
        run: |
          python3 -m ensurepip
          python3 -m pip install aiohttp toml
          python3 flatpak-builder-tools/cargo/flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: assets/org.hoshi.HoshiClient.yml
          bundle: hoshi-client.flatpak

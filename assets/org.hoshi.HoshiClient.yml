app-id: org.hoshi.HoshiClient
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: hoshi-client-gtk

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --share=network
  - --share=ipc
  - --filesystem=xdg-config/hoshi:create
  - --filesystem=xdg-data/hoshi:create

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/hoshi-client-gtk/cargo

modules:
  - name: hoshi-client-gtk
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/hoshi-client-gtk/cargo
    build-commands:
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release -p hoshi-client-gtk
      - install -Dm755 target/release/hoshi-client-gtk /app/bin/hoshi-client-gtk
      - install -Dm644 assets/org.hoshi.HoshiClient.desktop /app/share/applications/org.hoshi.HoshiClient.desktop
      - install -Dm644 assets/org.hoshi.HoshiClient.svg /app/share/icons/hicolor/scalable/apps/org.hoshi.HoshiClient.svg
    sources:
      - type: dir
        path: ..
      - cargo-sources.json
